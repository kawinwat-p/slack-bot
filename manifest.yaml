# Slack app manifest — paste into api.slack.com/apps "From an app manifest".
display_information:
  name: Workflow Ideas Bot
  description: Deep-interviews you from real channel context and proposes buildable workflows.
features:
  bot_user:
    display_name: workflow-ideas
    always_online: true
  slash_commands:
    - command: /workflow-ideas
      description: Generate buildable workflow ideas for this channel
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - channels:history
      - groups:history
      - users:read
      - canvases:write
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
